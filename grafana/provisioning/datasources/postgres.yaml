apiVersion: 1

datasources:
  - name: GitLab Metrics
    uid: gitlab-metrics
    type: postgres
    url: postgres:5432
    user: ${POSTGRES_USER}
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    isDefault: true
    editable: true
